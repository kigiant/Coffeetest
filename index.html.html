<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나는 어떤 원두일까? ☕</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F5ECD7;
  --latte: #C8A97E;
  --espresso: #2C1A0E;
  --roast: #6B3A2A;
  --milk: #FAF4EB;
  --fog: #E8DDD0;
  --washed: #4a7c59;
  --natural: #c4713f;
  --anaerobic: #3a5070;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--espresso);
  min-height: 100vh;
}

/* ── SCREEN ── */
#screen-intro,
#screen-test,
#screen-result {
  display: none;
  min-height: 100vh;
}
#screen-intro.active,
#screen-test.active,
#screen-result.active { display: flex; }

/* ════════════
   INTRO
════════════ */
#screen-intro {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  text-align: center;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(74,124,89,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(196,113,63,0.15) 0%, transparent 50%),
    var(--cream);
}

.intro-icon {
  font-size: 5rem;
  margin-bottom: 1.2rem;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.intro-series {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.85rem;
  letter-spacing: 0.2em;
  color: var(--latte);
  margin-bottom: 0.6rem;
  text-transform: uppercase;
}

.intro-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 2.2rem;
  font-weight: 700;
  color: var(--espresso);
  line-height: 1.3;
  margin-bottom: 1.2rem;
}

.intro-divider {
  width: 50px;
  height: 2px;
  background: var(--latte);
  margin: 0 auto 1.2rem;
}

.intro-desc {
  font-size: 0.88rem;
  line-height: 1.9;
  color: var(--roast);
  max-width: 380px;
  margin-bottom: 2.5rem;
}

.btn-start {
  background: var(--espresso);
  color: var(--cream);
  border: none;
  padding: 1rem 3rem;
  border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(44,26,14,0.25);
}
.btn-start:hover {
  background: var(--roast);
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(44,26,14,0.3);
}

/* ════════════
   TEST
════════════ */
#screen-test {
  flex-direction: column;
  padding: 0;
}

.test-topbar {
  position: sticky;
  top: 0;
  background: var(--espresso);
  padding: 1rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}

.topbar-title {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  color: var(--latte);
  font-size: 0.9rem;
}

.progress-wrap {
  flex: 1;
  max-width: 200px;
  margin: 0 1.2rem;
}
.progress-track {
  background: rgba(255,255,255,0.15);
  height: 4px;
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--latte);
  border-radius: 2px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 0.7rem;
  color: rgba(255,255,255,0.5);
  text-align: right;
  margin-top: 3px;
}

.test-body {
  flex: 1;
  max-width: 640px;
  width: 100%;
  margin: 0 auto;
  padding: 2.5rem 1.5rem 6rem;
}

/* Question card */
.q-card {
  background: var(--milk);
  border-radius: 16px;
  padding: 1.8rem;
  margin-bottom: 1.2rem;
  border-left: 4px solid transparent;
  transition: border-color 0.3s, box-shadow 0.3s;
  position: relative;
}
.q-card.answered { border-left-color: var(--latte); }

.q-number {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--latte);
  letter-spacing: 0.15em;
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}

.q-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--espresso);
  line-height: 1.5;
  margin-bottom: 1.2rem;
}

.options { display: flex; flex-direction: column; gap: 0.5rem; }

.option-btn {
  display: flex;
  align-items: center;
  gap: 0.85rem;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--fog);
  border-radius: 10px;
  background: white;
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  width: 100%;
}
.option-btn:hover {
  border-color: var(--latte);
  background: #fdf7ef;
}
.option-btn.selected {
  border-color: transparent;
  background: var(--espresso);
}
.option-btn.selected .opt-dot { background: var(--latte) !important; color: white; }
.option-btn.selected .opt-text { color: var(--cream); }

.opt-dot {
  width: 30px;
  height: 30px;
  min-width: 30px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  font-size: 0.85rem;
  transition: all 0.2s;
}
.dot-a { background: #d9edd6; color: var(--washed); }
.dot-b { background: #f5ddd0; color: var(--natural); }
.dot-c { background: #d3dde8; color: var(--anaerobic); }

.opt-text {
  font-size: 0.9rem;
  color: var(--roast);
  line-height: 1.5;
  transition: color 0.2s;
}

/* Submit bar */
.submit-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 1.2rem 1.5rem;
  background: linear-gradient(to top, var(--cream) 70%, transparent);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  pointer-events: none;
}
.submit-bar .btn-complete {
  pointer-events: all;
  background: var(--espresso);
  color: var(--cream);
  border: none;
  padding: 1rem 3rem;
  border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 4px 20px rgba(44,26,14,0.3);
  opacity: 0.4;
  letter-spacing: 0.05em;
}
.submit-bar .btn-complete.ready {
  opacity: 1;
  background: var(--roast);
}
.submit-bar .btn-complete.ready:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(44,26,14,0.35);
}
.submit-hint {
  pointer-events: none;
  font-size: 0.75rem;
  color: var(--roast);
  opacity: 0.7;
}

/* ════════════
   RESULT
════════════ */
#screen-result {
  flex-direction: column;
  align-items: center;
  padding: 0 0 5rem;
}

.result-hero {
  width: 100%;
  padding: 4rem 2rem 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.result-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0.12;
  background: radial-gradient(circle at 50% 0%, white 0%, transparent 70%);
}

.result-type-badge {
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.5);
  color: rgba(255,255,255,0.85);
  padding: 0.3rem 1.2rem;
  border-radius: 20px;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.8rem;
  letter-spacing: 0.1em;
  margin-bottom: 1.2rem;
}

.result-emoji {
  font-size: 4rem;
  margin-bottom: 0.6rem;
  animation: float 3s ease-in-out infinite;
}

.result-name-kr {
  font-family: 'Noto Serif KR', serif;
  font-size: 2rem;
  font-weight: 700;
  color: white;
  margin-bottom: 0.3rem;
}
.result-name-en {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: rgba(255,255,255,0.75);
  margin-bottom: 1.5rem;
}

.result-traits {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  margin-bottom: 1.8rem;
}
.result-trait {
  background: rgba(255,255,255,0.2);
  border: 1px solid rgba(255,255,255,0.35);
  color: white;
  padding: 0.3rem 0.9rem;
  border-radius: 20px;
  font-size: 0.8rem;
}

.result-verse-box {
  background: rgba(0,0,0,0.2);
  border-radius: 12px;
  padding: 1.2rem 1.5rem;
  max-width: 400px;
  font-size: 0.85rem;
  color: white;
  line-height: 1.8;
}
.result-verse-ref {
  display: block;
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 0.75rem;
  opacity: 0.75;
  margin-top: 0.4rem;
}

.result-body {
  width: 100%;
  max-width: 580px;
  padding: 2rem 1.5rem;
}

.result-section {
  background: var(--milk);
  border-radius: 14px;
  padding: 1.5rem;
  margin-bottom: 1rem;
}
.result-section h3 {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--latte);
  letter-spacing: 0.08em;
  margin-bottom: 0.8rem;
}
.result-section p {
  font-size: 0.9rem;
  line-height: 1.9;
  color: var(--roast);
}

.result-section.special {
  border-left: 4px solid var(--latte);
}

.score-row {
  display: flex;
  gap: 0.6rem;
  margin-top: 0.8rem;
}
.score-chip {
  flex: 1;
  text-align: center;
  padding: 0.5rem;
  border-radius: 8px;
  font-size: 0.78rem;
}
.score-chip .sc-val {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 700;
  display: block;
}

.btn-retry {
  display: block;
  width: 100%;
  max-width: 360px;
  margin: 1.5rem auto 0;
  text-align: center;
  background: var(--espresso);
  color: var(--cream);
  border: none;
  padding: 1rem;
  border-radius: 50px;
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.95rem;
  cursor: pointer;
  transition: all 0.25s;
}
.btn-retry:hover {
  background: var(--roast);
  transform: translateY(-1px);
}

/* entrance animation */
.fade-in {
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.stagger-1 { animation-delay: 0.05s; }
.stagger-2 { animation-delay: 0.1s; }
.stagger-3 { animation-delay: 0.15s; }
.stagger-4 { animation-delay: 0.2s; }
.stagger-5 { animation-delay: 0.25s; }
</style>
</head>
<body>

<!-- ══════ INTRO ══════ -->
<div id="screen-intro" class="active">
  <div class="intro-icon">☕</div>
  <p class="intro-series">Worship Coffee Series</p>
  <h1 class="intro-title">나는 어떤 원두일까?</h1>
  <div class="intro-divider"></div>
  <p class="intro-desc">
    10가지 질문에 솔직하게 답해보세요.<br>
    당신만의 원두 성향과<br>
    하나님이 주신 특별한 향기를 발견할 수 있어요 🌿
  </p>
  <button class="btn-start" onclick="startTest()">테스트 시작하기</button>
</div>

<!-- ══════ TEST ══════ -->
<div id="screen-test">
  <div class="test-topbar">
    <span class="topbar-title">나는 어떤 원두일까?</span>
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
      <div class="progress-label" id="progress-label">0 / 10</div>
    </div>
  </div>

  <div class="test-body" id="test-body">
    <!-- questions injected by JS -->
  </div>

  <div class="submit-bar">
    <button class="btn-complete" id="btn-complete" onclick="showResult()">결과 확인하기 ✦</button>
    <span class="submit-hint" id="submit-hint">모든 문항에 답하면 결과를 확인할 수 있어요</span>
  </div>
</div>

<!-- ══════ RESULT ══════ -->
<div id="screen-result">
  <!-- injected -->
</div>

};

const SCORE_LABEL = { A: "워시드", B: "내추럴", C: "언에어로빅" };
const SCORE_COLOR = {
  A: { bg: "#d9edd6", text: "#3d6e4a" },
  B: { bg: "#f5ddd0", text: "#c4713f" },
  C: { bg: "#d3dde8", text: "#3a5070" },
};

let answers = new Array(QUESTIONS.length).fill(null);

function startTest() {
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-test').classList.add('active');
  renderQuestions();
  window.scrollTo(0, 0);
}

function renderQuestions() {
  const body = document.getElementById('test-body');
  body.innerHTML = '';
  QUESTIONS.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card fade-in';
    card.id = `q-${qi}`;
    card.style.animationDelay = `${qi * 0.04}s`;
    card.innerHTML = `
      <div class="q-number">Question ${String(qi+1).padStart(2,'0')}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.opts.map((o, oi) => `
          <button class="option-btn" onclick="selectAnswer(${qi}, '${o.type}', this)">
            <div class="opt-dot dot-${o.label.toLowerCase()}">${o.label}</div>
            <div class="opt-text">${o.text}</div>
          </button>
        `).join('')}
      </div>
    `;
    body.appendChild(card);
  });
  updateProgress();
}

function selectAnswer(qi, type, btn) {
  // 같은 질문의 버튼들 선택 해제
  const card = document.getElementById(`q-${qi}`);
  card.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  card.classList.add('answered');
  answers[qi] = type;
  updateProgress();
}

function updateProgress() {
  const done = answers.filter(a => a !== null).length;
  const pct = (done / QUESTIONS.length) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${done} / ${QUESTIONS.length}`;

  const btn = document.getElementById('btn-complete');
  const hint = document.getElementById('submit-hint');
  const remaining = QUESTIONS.length - done;
  if (done === QUESTIONS.length) {
    btn.classList.add('ready');
    hint.textContent = '✦ 모두 완료! 결과를 확인해보세요';
  } else {
    btn.classList.remove('ready');
    hint.textContent = `${remaining}개 문항이 남았어요`;
  }
}

function getResult() {
  const count = { A: 0, B: 0, C: 0 };
  answers.forEach(a => { if(a) count[a]++; });

  const max = Math.max(count.A, count.B, count.C);
  const winners = Object.keys(count).filter(k => count[k] === max);

  if (winners.length === 1) return { key: winners[0], count };

  // 동점 처리
  const combined = winners.sort().join('');
  if (combined === 'AB') return { key: 'AB', count };
  if (combined === 'BC') return { key: 'BC', count };
  if (combined === 'AC') return { key: 'AC', count };
  // 3개 동점 → A 우선
  return { key: 'A', count };
}

function showResult() {
  if (answers.some(a => a === null)) return;

  const { key, count } = getResult();
  const r = RESULTS[key];

  const screen = document.getElementById('screen-result');
  screen.innerHTML = `
    <div class="result-hero fade-in" style="background: ${r.gradient}">
      <div class="result-type-badge">${r.badge}</div>
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-name-kr">${r.name_kr}</div>
      <div class="result-name-en">${r.name_en}</div>
      <div class="result-traits">
        ${r.traits.map(t => `<span class="result-trait">${t}</span>`).join('')}
      </div>
      ${r.verse ? `
      <div class="result-verse-box">
        ${r.verse}
        ${r.verse_ref ? `<span class="result-verse-ref">— ${r.verse_ref}</span>` : ''}
      </div>` : ''}
    </div>

    <div class="result-body">
      <div class="result-section fade-in stagger-1">
        <h3>✦ 나의 성향</h3>
        <p><strong>${r.short}</strong><br><br>${r.desc}</p>
      </div>

      <div class="result-section special fade-in stagger-2">
        <h3>✦ 하나님이 주신 특별함</h3>
        <p>${r.special}</p>
      </div>

      <div class="result-section fade-in stagger-3">
        <h3>✦ 나의 점수</h3>
        <div class="score-row">
          ${['A','B','C'].map(k => `
            <div class="score-chip" style="background:${SCORE_COLOR[k].bg}">
              <span class="sc-val" style="color:${SCORE_COLOR[k].text}">${count[k]}</span>
              <span style="font-size:0.7rem;color:${SCORE_COLOR[k].text}">${SCORE_LABEL[k]}</span>
            </div>
          `).join('')}
        </div>
      </div>

      <button class="btn-retry fade-in stagger-4" onclick="resetTest()">다시 테스트하기</button>
    </div>
  `;

  document.getElementById('screen-test').classList.remove('active');
  screen.classList.add('active');
  window.scrollTo(0, 0);
}

function resetTest() {
  answers = new Array(QUESTIONS.length).fill(null);
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-intro').classList.add('active');
  window.scrollTo(0, 0);
}
</script>
